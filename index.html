<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu AI Assistant</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #ffffff;
            --user-msg: #007acc;
            --ai-msg: #3e3e3e;
            --accent-color: #ff4757;
            --input-bg: #3a3a3a;
            --bg-image: none;
        }

        /* Anime Theme Variables */
        .anime-theme {
            --bg-color: #0f0c1b;
            --container-bg: rgba(25, 20, 40, 0.85);
            --text-color: #fff;
            --user-msg: #ff79c6;
            --ai-msg: #bd93f9;
            --accent-color: #ff79c6;
            --input-bg: rgba(40, 35, 60, 0.9);
            --bg-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1200&auto=format&fit=crop'); /* Placeholder anime-style background */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: all 0.3s ease;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .theme-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .theme-btn:active {
            transform: scale(0.95);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .chat-input-area button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .api-box {
            padding: 10px 20px;
            background: #cc2929;
            color: white;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- API Reminder Banner -->
        <div class="api-box" id="apiBanner">
            Remember to add your OpenRouter API key in the HTML script tag!
        </div>

        <div class="chat-header">
            <h1>Emu AI</h1>
            <button class="theme-btn" onclick="toggleTheme()">Toggle Anime Style</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                Hello! I am Emu AI. How can I help you today?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // CONFIGURATION: Put your OpenRouter API Key here
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE";
        // Choose your model (e.g., "google/gemini-2.5-flash", "meta-llama/llama-3-8b-instruct:free")
        const MODEL_NAME = "google/gemini-2.5-flash"; 

        // Hide banner if key is replaced
        if(OPENROUTER_API_KEY !== "YOUR_OPENROUTER_API_KEY_HERE") {
            document.getElementById('apiBanner').style.display = 'none';
        }

        // Toggle Anime Theme
        function toggleTheme() {
            document.body.classList.toggle('anime-theme');
        }

        // Handle Enter Key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send Message logic
        async function sendMessage() {
            const inputElement = document.getElementById('userInput');
            const messageText = inputElement.value.trim();
            
            if (messageText === "") return;

            // Append User Message to UI
            appendMessage(messageText, 'user-message');
            inputElement.value = "";

            if (OPENROUTER_API_KEY === "YOUR_OPENROUTER_API_KEY_HERE") {
                appendMessage("Error: Please set your OpenRouter API key inside the script code.", 'ai-message');
                return;
            }

            // Append Loading/Thinking Message
            const loadingId = appendMessage("Emu AI is typing...", 'ai-message');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // Optional clean tracking
                        "X-Title": "Emu AI Browser App" 
                    },
                    body: JSON.stringify({
                        "model": MODEL_NAME,
                        "messages": [
                            {"role": "system", "value": "You are Emu AI, an incredibly smart, friendly, and comprehensive AI assistant who knows everything and can assist with any task."},
                            {"role": "user", "content": messageText}
                        ]
                    })
                });

                const data = await response.json();
                
                // Remove loading message
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0].message) {
                    appendMessage(data.choices[0].message.content, 'ai-message');
                } else {
                    appendMessage("Sorry, I encountered an issue parsing the response.", 'ai-message');
                }

            } catch (error) {
                console.error(error);
                document.getElementById(loadingId).remove();
                appendMessage("Failed to connect to Emu AI. Check your internet connection or API setup.", 'ai-message');
            }
        }

        // Helper to append messages to container
        function appendMessage(text, className) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            
            messageDiv.className = `message ${className}`;
            messageDiv.id = uniqueId;
            messageDiv.innerText = text;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll down
            
            return uniqueId;
        }
    </script>
</body>
</html>
