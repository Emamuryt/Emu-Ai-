<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
        }
        /* Custom scrollbar to match modern UI */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
    </style>
</head>
<body id="body-bg" class="bg-[#f0f4f9] text-[#1f1f1f] h-screen flex flex-col transition-all duration-300 bg-cover bg-center">

    <header class="flex items-center justify-between px-6 py-4 bg-transparent backdrop-blur-sm z-10">
        <div class="flex items-center space-x-2">
            <span class="text-2xl font-medium tracking-tight bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">Emu AI</span>
        </div>
        
        <button onclick="toggleSettings()" class="p-2 hover:bg-gray-200/50 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.767c-.293.224-.443.59-.422.956l.006.242c-.006.114-.01.228-.01.343 0 .114.004.228.01.343l-.006.242c-.02.366.13.732.422.956l1.004.767a1.125 1.125 0 0 1 .26 1.43l-1.297 2.247a1.125 1.125 0 0 1-1.37.49l-1.216-.456c-.356-.133-.751-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.767c.292-.224.443-.59.421-.956l-.005-.242c.005-.114.01-.228.01-.343 0-.114-.005-.228-.01-.343l.005-.242c.022-.366-.129-.732-.421-.956l-1.004-.767a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.49l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
        </button>
    </header>

    <div id="settings-panel" class="hidden fixed top-16 right-6 bg-white p-6 rounded-2xl shadow-xl border border-gray-100 w-80 z-20 space-y-4">
        <h3 class="text-lg font-medium border-b pb-2">Emu Configuration</h3>
        <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">OpenRouter API Key</label>
            <input type="password" id="api-key" value="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" class="w-full p-2 border rounded-lg text-sm focus:outline-blue-500">
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">Model ID</label>
            <input type="text" id="model-id" value="google/gemma-4-31b-it:free" placeholder="e.g., google/gemini-2.5-pro" class="w-full p-2 border rounded-lg text-sm focus:outline-blue-500">
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">Background Styling</label>
            <select id="bg-type" onchange="updateBackground()" class="w-full p-2 border rounded-lg text-sm focus:outline-blue-500 mb-2">
                <option value="gemini">Default Gemini Light</option>
                <option value="dark">Midnight Dark</option>
                <option value="custom-color">Custom Color</option>
                <option value="custom-img">Custom Image URL</option>
            </select>
            <input type="text" id="bg-value" placeholder="#ffffff or https://image.link" oninput="updateBackground()" class="hidden w-full p-2 border rounded-lg text-sm focus:outline-blue-500">
        </div>
        <button onclick="toggleSettings()" class="w-full bg-blue-600 text-white p-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">Save & Close</button>
    </div>

    <main class="flex-1 flex flex-col max-w-4xl w-full mx-auto justify-between p-4 overflow-hidden relative">
        
        <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 flex flex-col">
            <div id="welcome-screen" class="my-auto text-center space-y-4">
                <h1 class="text-4xl font-medium tracking-tight bg-gradient-to-r from-blue-600 via-purple-500 to-pink-500 bg-clip-text text-transparent inline-block">Hello, I'm Emu AI</h1>
                <p class="text-gray-500 max-w-md mx-auto text-sm">How can I help you today? You can ask questions, upload files/images, or request actions just like Gemini.</p>
            </div>
        </div>

        <div class="mt-4 bg-transparent">
            <div id="file-preview-container" class="hidden mb-2 p-2 bg-white/80 backdrop-blur rounded-xl border border-gray-200 flex items-center justify-between max-w-xs ml-4 shadow-sm">
                <div class="flex items-center space-x-2 overflow-hidden">
                    <span id="file-icon" class="text-xl">📁</span>
                    <span id="file-name" class="text-xs font-medium truncate text-gray-600">file.jpg</span>
                </div>
                <button onclick="clearAttachment()" class="text-gray-400 hover:text-gray-600 ml-2">✕</button>
            </div>

            <div class="relative flex items-center bg-white border border-gray-200 rounded-full shadow-md px-4 py-2.5 focus-within:ring-2 focus-within:ring-blue-400 focus-within:border-transparent transition-all max-w-4xl mx-auto">
                
                <label class="cursor-pointer p-2 hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-500">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)">
                </label>

                <input type="text" id="user-input" placeholder="Message Emu AI..." class="w-full bg-transparent px-4 py-1 text-base text-gray-800 focus:outline-none placeholder-gray-400" onkeydown="if(event.key === 'Enter') sendMessage()">

                <button onclick="sendMessage()" class="p-2 bg-blue-50 hover:bg-blue-100 rounded-full transition-colors text-blue-600 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                    </svg>
                </button>
            </div>
            <div class="text-[11px] text-center text-gray-400 mt-2">
                Emu AI can make mistakes. Verify important info.
            </div>
        </div>
    </main>

    <script>
        let attachedFileBase64 = null;
        let attachedFileType = null;

        // Toggle configuration panel
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('hidden');
        }

        // Dynamic Background Control
        function updateBackground() {
            const type = document.getElementById('bg-type').value;
            const valInput = document.getElementById('bg-value');
            const body = document.getElementById('body-bg');

            // Reset styles
            body.style.backgroundColor = '';
            body.style.backgroundImage = '';
            body.className = "h-screen flex flex-col transition-all duration-300 bg-cover bg-center text-[#1f1f1f]";
            valInput.classList.add('hidden');

            if (type === 'gemini') {
                body.classList.add('bg-[#f0f4f9]');
            } else if (type === 'dark') {
                body.classList.add('bg-[#131314]', 'text-white');
            } else if (type === 'custom-color') {
                valInput.classList.remove('hidden');
                if(valInput.value) body.style.backgroundColor = valInput.value;
            } else if (type === 'custom-img') {
                valInput.classList.remove('hidden');
                if(valInput.value) body.style.backgroundImage = `url('${valInput.value}')`;
            }
        }

        // Handle File Input and transform to Base64 (Required for image conversion/analysis APIs)
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('file-name').innerText = file.name;
            document.getElementById('file-preview-container').classList.remove('hidden');
            
            if (file.type.startsWith('image/')) {
                document.getElementById('file-icon').innerText = '🖼️';
            } else {
                document.getElementById('file-icon').innerText = '📄';
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedFileBase64 = e.target.result.split(',')[1]; // Get raw base64 data
                attachedFileType = file.type;
            };
            reader.readAsDataURL(file);
        }

        function clearAttachment() {
            attachedFileBase64 = null;
            attachedFileType = null;
            document.getElementById('file-input').value = '';
            document.getElementById('file-preview-container').classList.add('hidden');
        }

        // Inject messaging into UI bubbles
        function appendMessage(sender, text, isImage = false) {
            const chatContainer = document.getElementById('chat-container');
            const welcomeScreen = document.getElementById('welcome-screen');
            if (welcomeScreen) welcomeScreen.remove();

            const msgRow = document.createElement('div');
            msgRow.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} mb-4 animate-fade-in`;

            const bubble = document.createElement('div');
            bubble.className = sender === 'user' 
                ? 'bg-[#e3e3e3] text-gray-800 px-4 py-2.5 rounded-2xl max-w-xl text-sm shadow-sm' 
                : 'text-sm max-w-2xl px-2 py-1 leading-relaxed';

            if (isImage) {
                bubble.innerHTML = `<img src="${text}" alt="Generated AI Image" class="rounded-xl max-w-full h-auto shadow-md border mt-2" />`;
            } else {
                bubble.innerText = text;
            }

            msgRow.appendChild(bubble);
            chatContainer.appendChild(msgRow);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Core API orchestrator
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const prompt = inputEl.value.trim();
            const apiKey = document.getElementById('api-key').value;
            const model = document.getElementById('model-id').value;

            if (!prompt && !attachedFileBase64) return;
            if (!apiKey) {
                alert('Please open Settings (⚙️) and enter your OpenRouter API Key first!');
                return;
            }

            // UI feedback
            appendMessage('user', prompt || "Uploaded a file");
            inputEl.value = '';

            // Handle Image Generation Route (DALL-E 3 / Stable Diffusion check via prompt keyword)
            if (prompt.toLowerCase().startsWith('generate image') || prompt.toLowerCase().startsWith('create an image')) {
                appendMessage('emu', 'Generating your image, please wait...');
                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            "model": "openai/dall-e-3", // OpenRouter routing to image gen model
                            "prompt": prompt
                        })
                    });
                    const data = await response.json();
                    const imgUrl = data.data[0].url;
                    appendMessage('emu', imgUrl, true);
                } catch (error) {
                    appendMessage('emu', 'Error generating image. Ensure your model supports image generation or check your API credits.');
                }
                clearAttachment();
                return;
            }

            // Handle Standard Text/Vision Chat Completion
            appendMessage('emu', 'Thinking...');
            const chatContainer = document.getElementById('chat-container');
            const loadingBubble = chatContainer.lastChild.querySelector('div');

            try {
                let contentPayload = [];
                
                if (prompt) {
                    contentPayload.push({ type: "text", text: prompt });
                }

                // If file is an image, append data structure for Multimodal/Vision processing
                if (attachedFileBase64 && attachedFileType.startsWith('image/')) {
                    contentPayload.push({
                        type: "image_url",
                        image_url: {
                            url: `data:${attachedFileType};base64,${attachedFileBase64}`
                        }
                    });
                } else if (attachedFileBase64) {
                    contentPayload.push({
                        type: "text",
                        text: `[Attached Document/File Data: Base64 string omitted for layout - please summarize file]`
                    });
                }

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "HTTP-Referer": window.location.origin, 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [
                            { "role": "user", "content": contentPayload }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                loadingBubble.innerText = reply;

            } catch (error) {
                loadingBubble.innerText = 'Error connecting to Emu AI framework. Please verify your OpenRouter configuration settings.';
            }

            clearAttachment();
        }
    </script>
</body>
</html>
